<svg width="100%" viewBox="0 0 1500 720" xmlns="http://www.w3.org/2000/svg" style="background:transparent">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f3f6"/>
      <stop offset="100%" stop-color="#dce2e8"/>
    </linearGradient>
    <linearGradient id="bodyGradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8edf2"/>
      <stop offset="100%" stop-color="#d8dee6"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e4e9ee"/>
      <stop offset="50%" stop-color="#cdd4dc"/>
      <stop offset="100%" stop-color="#e0e5ea"/>
    </linearGradient>
    <linearGradient id="chimneyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8dee6"/>
      <stop offset="50%" stop-color="#c0c8d2"/>
      <stop offset="100%" stop-color="#d4dae2"/>
    </linearGradient>
    <linearGradient id="cycloneGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e6ec"/>
      <stop offset="40%" stop-color="#cdd5de"/>
      <stop offset="100%" stop-color="#e2e8ee"/>
    </linearGradient>
  </defs>

  <!-- COMBUSTION CHAMBER -->
  <rect x="60" y="410" width="180" height="210" rx="3"
        fill="url(#bodyGrad)" stroke="#3a4550" stroke-width="1.8"/>
  <rect x="70" y="420" width="160" height="190" rx="1"
        fill="none" stroke="#5a6570" stroke-width="0.7"/>

  <!-- BURNER PORT G1 (upper) — stub, blank indicator space -->
  <rect x="44" y="458" width="16" height="26" rx="1"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1.8"/>

  <!-- BURNER PORT G2 (lower) — stub, blank indicator space -->
  <rect x="44" y="538" width="16" height="26" rx="1"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1.8"/>

  <!-- TRANSITION DUCT fill -->
  <path d="M 240,410 C 280,350 240,250 320,240 L 320,380 C 260,410 300,620 240,620 Z"
        fill="url(#bodyGrad)" stroke="none"/>
  <!-- Transition top wall -->
  <path d="M 240,410 C 280,350 240,250 320,240"
        fill="none" stroke="#3a4550" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Transition bottom wall -->
  <path d="M 240,620 C 300,620 260,410 320,380"
        fill="none" stroke="#3a4550" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- COOLING INLET DUCT (vertical stub feeding from below) -->
  <rect x="356" y="380" width="28" height="65" fill="url(#pipeGrad)"
        stroke="#3a4550" stroke-width="1.8"/>

  <!-- MAIN HORIZONTAL DUCT (wide) -->
  <rect x="320" y="240" width="360" height="140"
        fill="url(#bodyGradH)" stroke="#3a4550" stroke-width="1.8"/>
  <line x1="335" y1="275" x2="670" y2="275"
        stroke="#b8c4d0" stroke-width="0.5" stroke-dasharray="8 6"/>
  <line x1="335" y1="310" x2="670" y2="310"
        stroke="#b8c4d0" stroke-width="0.5" stroke-dasharray="8 6"/>
  <line x1="335" y1="345" x2="670" y2="345"
        stroke="#b8c4d0" stroke-width="0.5" stroke-dasharray="8 6"/>

  <!-- FLAP ACTUATOR STEM + BOX -->
  <line x1="500" y1="240" x2="500" y2="210"
        stroke="#3a4550" stroke-width="1.8"/>
  <rect x="485" y="185" width="30" height="28" rx="2"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1.8"/>

  <!-- FLAP PLATE (diagonal pivot) -->
  <line x1="447" y1="345" x2="553" y2="275"
        stroke="#3a4550" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="500" cy="310" r="5"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1.2"/>

  <!-- BYPASS / BURN DIVIDER (dashed midline from flap onward) -->
  <line x1="500" y1="310" x2="680" y2="310"
        stroke="#3a4550" stroke-width="1.2" stroke-dasharray="7 4"/>

  <!-- BYPASS ZONE TINT -->
  <rect x="506" y="241" width="172" height="68"
        fill="#3a8a5a" fill-opacity="0.07" stroke="none"/>

  <!-- BURN ZONE TINT -->
  <rect x="506" y="311" width="172" height="68"
        fill="#c05818" fill-opacity="0.07" stroke="none"/>

  <!-- BYPASS LABEL + ARROW -->
  <path d="M 520,277 l 28,0 l -5,-4 m 5,4 l -5,4"
        fill="none" stroke="#3a7a3a" stroke-width="1.6" stroke-linecap="round"/>
  <text x="554" y="281" font-family="'Courier New',Courier,monospace"
        font-size="10" fill="#3a7a3a" letter-spacing="0.06em">BYPASS</text>

  <!-- BURN LABEL + ARROW -->
  <path d="M 520,341 l 28,0 l -5,-4 m 5,4 l -5,4"
        fill="none" stroke="#8a4a1a" stroke-width="1.6" stroke-linecap="round"/>
  <text x="554" y="345" font-family="'Courier New',Courier,monospace"
        font-size="10" fill="#8a4a1a" letter-spacing="0.06em">BURN</text>

  <!-- DUCT CONTRACTION (trapezoid) -->
  <polygon points="680,240 730,265 730,355 680,380"
        fill="url(#bodyGradH)" stroke="#3a4550" stroke-width="1.8"
        stroke-linejoin="round"/>

  <!-- NARROW DUCT (after contraction) -->
  <rect x="730" y="265" width="100" height="90"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1.8"/>

  <!-- SETTLING HOPPER below narrow duct -->
  <line x1="745" y1="355" x2="745" y2="400" stroke="#3a4550" stroke-width="1.8"/>
  <line x1="820" y1="355" x2="820" y2="400" stroke="#3a4550" stroke-width="1.8"/>
  <polygon points="730,400 835,400 806,478 759,478"
        fill="url(#bodyGrad)" stroke="#3a4550" stroke-width="1.8"
        stroke-linejoin="round"/>
  <!-- Hopper outlet -->
  <rect x="767" y="478" width="31" height="16" rx="1"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1.8"/>
  <line x1="760" y1="494" x2="805" y2="494"
        stroke="#3a4550" stroke-width="1.8"/>

  <!-- COOLING FAN (blank hub only, indicator space) -->
  <rect x="356" y="445" width="28" height="38" fill="url(#pipeGrad)"
        stroke="#3a4550" stroke-width="1.8"/>
  <circle cx="370" cy="527" r="40"
        fill="#dfe5eb" stroke="#3a4550" stroke-width="1.8"/>
  <circle cx="370" cy="527" r="32"
        fill="#c8d2dc" stroke="#3a4550" stroke-width="1"/>
  <!-- Fan blades placeholder (dotted circle, real blades drawn by PumpIndicator) -->
  <circle cx="370" cy="527" r="6"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1"/>
  <!-- Fan motor box -->
  <rect x="410" y="511" width="48" height="32" rx="2"
        fill="#dfe5eb" stroke="#3a4550" stroke-width="1.8"/>
  <line x1="409" y1="527" x2="412" y2="527"
        stroke="#3a4550" stroke-width="2.7"/>
  <!-- Baseplate -->
  <line x1="330" y1="567" x2="456" y2="567"
        stroke="#3a4550" stroke-width="1.8"/>
  <line x1="330" y1="569" x2="330" y2="575"
        stroke="#3a4550" stroke-width="1.8"/>
  <line x1="456" y1="569" x2="456" y2="575"
        stroke="#3a4550" stroke-width="1.8"/>

  <!-- PIPE FROM NARROW DUCT EXIT CURVING DOWN TO FAN 2 -->
  <path d="M 830,265 Q 884,265 884,320 L 884,382"
        fill="none" stroke="#3a4550" stroke-width="20" stroke-linecap="square"/>
  <path d="M 830,265 Q 884,265 884,320 L 884,382"
        fill="none" stroke="#dde3e9" stroke-width="17" stroke-linecap="square"/>
  <path d="M 830,265 Q 884,265 884,320 L 884,382"
        fill="none" stroke="#3a4550" stroke-width="20" stroke-linecap="square" opacity="0"
        stroke-dasharray="1" />
  <!-- FAN 2 (blank hub, indicator space) -->
  <circle cx="884" cy="424" r="40"
        fill="#dfe5eb" stroke="#3a4550" stroke-width="1.8"/>
  <circle cx="884" cy="424" r="32"
        fill="#c8d2dc" stroke="#3a4550" stroke-width="1"/>
  <circle cx="884" cy="424" r="6"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1"/>
  <!-- Fan 2 motor box -->
  <rect x="924" y="408" width="48" height="32" rx="2"
        fill="#dfe5eb" stroke="#3a4550" stroke-width="1.8"/>
  <line x1="922" y1="424" x2="926" y2="424"
        stroke="#3a4550" stroke-width="2.7"/>
  <!-- Baseplate -->
  <line x1="844" y1="464" x2="970" y2="464"
        stroke="#3a4550" stroke-width="1.8"/>
  <line x1="844" y1="466" x2="844" y2="472"
        stroke="#3a4550" stroke-width="1.8"/>
  <line x1="970" y1="466" x2="970" y2="472"
        stroke="#3a4550" stroke-width="1.8"/>

  <!-- VERTICAL RISER from fan 2 outlet going up -->
  <rect x="864" y="100" width="40" height="280"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1.8"/>
  <!-- Fan outlet collar top -->
  <rect x="860" y="378" width="48" height="24" rx="2"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1.8"/>

  <!-- BYPASS UPPER DUCT — exits top of main duct, runs across -->
  <rect x="680" y="208" width="188" height="32"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1.8"/>
  <!-- Bypass joins riser at y=208..240 -->
  <rect x="864" y="208" width="40" height="32"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1" opacity="0.5"/>

  <!-- BURN LOWER DUCT — exits bottom of main duct (or narrowed duct), runs across -->
  <rect x="730" y="348" width="138" height="30"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1.8"/>
  <!-- Burn path joins riser at bottom -->
  <rect x="864" y="348" width="40" height="30"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1" opacity="0.5"/>

  <!-- BURNER PORT G3 horizontal stub on riser (indicator space) -->
  <rect x="842" y="136" width="22" height="24" rx="1"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1.8"/>

  <!-- ELBOW at top of riser — curves horizontal to right -->
  <path d="M 864,100 Q 864,72 904,72 L 1090,72"
        fill="none" stroke="#3a4550" stroke-width="21" stroke-linecap="square"/>
  <path d="M 864,100 Q 864,72 904,72 L 1090,72"
        fill="none" stroke="#dde3e9" stroke-width="18" stroke-linecap="square"/>

  <!-- TOP HORIZONTAL DUCT continuation -->
  <rect x="900" y="62" width="294" height="38"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1.8"/>

  <!-- RISER TO CHIMNEY (right side) -->
  <rect x="1158" y="62" width="38" height="185"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1.8"/>

  <!-- HORIZONTAL DUCT from riser to chimney inlet -->
  <rect x="1158" y="62" width="116" height="38"
        fill="url(#pipeGrad)" stroke="#3a4550" stroke-width="1.8"/>

  <!-- CHIMNEY SUPPORT A-FRAME LEGS -->
  <line x1="1292" y1="130" x2="1224" y2="680"
        stroke="#3a4550" stroke-width="1.8"/>
  <line x1="1314" y1="130" x2="1382" y2="680"
        stroke="#3a4550" stroke-width="1.8"/>
  <line x1="1271" y1="318" x2="1337" y2="318"
        stroke="#5a6570" stroke-width="1.1"/>
  <line x1="1251" y1="490" x2="1357" y2="490"
        stroke="#5a6570" stroke-width="1.1"/>
  <line x1="1271" y1="318" x2="1357" y2="490"
        stroke="#5a6570" stroke-width="0.7" stroke-dasharray="4 4"/>
  <line x1="1337" y1="318" x2="1251" y2="490"
        stroke="#5a6570" stroke-width="0.7" stroke-dasharray="4 4"/>
  <line x1="1208" y1="680" x2="1402" y2="680"
        stroke="#3a4550" stroke-width="1.8"/>

  <!-- CHIMNEY STACK (tapered polygon) -->
  <polygon points="1276,55 1334,55 1344,660 1266,660"
        fill="url(#chimneyGrad)" stroke="#3a4550" stroke-width="1.8"
        stroke-linejoin="round"/>
  <!-- Cap top -->
  <polygon points="1264,28 1346,28 1334,56 1276,56"
        fill="url(#chimneyGrad)" stroke="#3a4550" stroke-width="1.8"
        stroke-linejoin="round"/>
  <!-- Stack ring details -->
  <line x1="1275" y1="145" x2="1337" y2="145"
        stroke="#5a6570" stroke-width="1"/>
  <line x1="1272" y1="318" x2="1340" y2="318"
        stroke="#5a6570" stroke-width="1"/>
  <line x1="1269" y1="490" x2="1343" y2="490"
        stroke="#5a6570" stroke-width="1"/>
  <!-- Chimney inlet (bottom feed) -->
  <rect x="1266" y="65" width="13" height="38" rx="1"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1.8"/>
  <!-- Ash hopper on chimney side -->
  <polygon points="1344,510 1370,497 1370,534 1344,547"
        fill="#d0d8e0" stroke="#3a4550" stroke-width="1"
        stroke-linejoin="round"/>

  <!-- FLOW ARROWS (subtle) -->
  <path d="M 378,310 l 22,0 l -5,-4 m 5,4 l -5,4"
        fill="none" stroke="#8a9ab0" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 440,310 l 22,0 l -5,-4 m 5,4 l -5,4"
        fill="none" stroke="#8a9ab0" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 714,224 l 22,0 l -5,-4 m 5,4 l -5,4"
        fill="none" stroke="#3a7a3a" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <path d="M 756,362 l 22,0 l -5,-4 m 5,4 l -5,4"
        fill="none" stroke="#8a4a1a" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <path d="M 884,258 l 0,-22 l -4,5 m 4,-5 l 4,5"
        fill="none" stroke="#8a9ab0" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 960,79 l 22,0 l -5,-4 m 5,4 l -5,4"
        fill="none" stroke="#8a9ab0" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 1060,79 l 22,0 l -5,-4 m 5,4 l -5,4"
        fill="none" stroke="#8a9ab0" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 1196,130 l 0,-22 l -4,5 m 4,-5 l 4,5"
        fill="none" stroke="#8a9ab0" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 1210,79 l 22,0 l -5,-4 m 5,4 l -5,4"
        fill="none" stroke="#8a9ab0" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 1303,80 l 0,-24 l -4,5 m 4,-5 l 4,5"
        fill="none" stroke="#8a9ab0" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- LABELS -->
  <text x="108" y="527" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#5a6570" text-anchor="middle" letter-spacing="0.05em">КАМ.</text>
  <text x="108" y="539" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#5a6570" text-anchor="middle" letter-spacing="0.05em">СГОРАНИЯ</text>

  <text x="370" y="598" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#5a6570" text-anchor="middle" letter-spacing="0.05em">Д1 (ВН)</text>

  <text x="884" y="498" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#5a6570" text-anchor="middle" letter-spacing="0.05em">Д2 (ОТС)</text>

  <text x="883" y="166" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#5a6570" text-anchor="end" letter-spacing="0.05em">Г3</text>

  <text x="32" y="471" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#5a6570" text-anchor="end" letter-spacing="0.05em">Г1</text>

  <text x="32" y="551" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#5a6570" text-anchor="end" letter-spacing="0.05em">Г2</text>

  <text x="371" y="450" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#3a8a3a" text-anchor="middle" letter-spacing="0.05em">COOLING</text>

</svg>